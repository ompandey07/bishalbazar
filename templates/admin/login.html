{% load static %}
<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bishal Bazar</title>
    <link rel="shortcut icon" href="{% static 'favicon.png' %}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#DC2626' },
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #fafafa; }
        .login-card { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-input { width: 100%; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 0.875rem 1rem; font-size: 0.875rem; transition: all 0.2s; background: #fff; }
        .form-input:focus { outline: none; border-color: #DC2626; box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); } 20%, 40%, 60%, 80% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] login-card">
        <!-- Logo -->
        <div class="text-center mb-10">
            <img src="{% static 'bishal-bazar-logo.png' %}" alt="Bishal Bazar" class="h-14 mx-auto mb-4">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight uppercase">Admin Access</h1>
            <p class="text-gray-400 text-sm font-medium mt-1">प्रशासक प्यानलमा स्वागत छ</p>
        </div>

        <!-- Login Box -->
        <div class="bg-white rounded-3xl border border-gray-100 shadow-2xl p-8 sm:p-10">
            
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="flex items-center gap-3 p-4 rounded-xl {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100 animate-shake{% else %}bg-green-50 text-green-600 border border-green-100{% endif %}">
                    <i data-lucide="{% if message.tags == 'error' %}alert-circle{% else %}check-circle{% endif %}" class="w-5 h-5 flex-shrink-0"></i>
                    <span class="text-xs font-bold">{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'admin_login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">इमेल ठेगाना</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="email" name="email" required placeholder="name@company.com" class="form-input pl-11">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">पासवर्ड</label>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••" class="form-input pl-11">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i data-lucide="eye" class="w-4 h-4" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-black transition-all duration-300 shadow-lg hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-2">
                    लगइन गर्नुहोस् <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                <a href="{% url 'index' %}" class="inline-flex items-center gap-2 text-gray-400 hover:text-red-600 transition text-xs font-bold uppercase tracking-widest">
                    <i data-lucide="home" class="w-3.5 h-3.5"></i> मुख्य वेबसाइटमा जानुहोस्
                </a>
            </div>
        </div>

        <p class="mt-10 text-center text-gray-300 text-[10px] font-bold uppercase tracking-[0.2em]">
            &copy; 2026 Bishal Bazar Co. Ltd. &bull; Secure Access
        </p>
    </div>

    <script>
        lucide.createIcons();
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons({ nodes: [icon.parentElement] });
        }
    </script>
</body>
</html>
